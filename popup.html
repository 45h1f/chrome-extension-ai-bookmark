<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Tools Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <main class="app">
      <section class="search-section">
        <div class="search-wrap">
          <input
            id="searchInput"
            type="text"
            placeholder="Search AI tools..."
            autocomplete="off"
            spellcheck="false"
          />
          <button id="clearSearchBtn" class="clear-btn" type="button" aria-label="Clear search">
            Clear
          </button>
        </div>
      </section>

      <section class="tools-section">
        <div class="list-status">
          <span id="visibleCount">0 tools</span>
          <span>Most used first</span>
        </div>
        <ul id="toolsList" class="tools-list" aria-live="polite"></ul>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
